services:
  redis:
    image: redis:7-alpine
    container_name: seller-load-tester-redis
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change-me}"]

  mongo:
    image: mongo:7
    container_name: seller-load-tester-mongo
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-mongo-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change-me}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:-mongo-app}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-change-me}
      MONGO_APP_DB: ${MONGO_APP_DB:-load_tester}
    volumes:
      - mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  app:
    build: .
    container_name: seller-load-tester-app
    depends_on:
      - redis
      - mongo
    environment:
      - HTTP_PORT=8080
      - REDIS_URL=seller-load-tester-redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change-me}
      - MONGO_URI=mongodb://${MONGO_APP_USERNAME:-mongo-app}:${MONGO_APP_PASSWORD:-change-me}@seller-load-tester-mongo:27017/?authSource=${MONGO_APP_DB:-load_tester}
      - MONGO_DB=${MONGO_APP_DB:-load_tester}
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./runs:/app/runs

volumes:
  mongo-data:

